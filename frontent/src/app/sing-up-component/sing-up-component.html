<div class="page-form">
    <span *ngIf="loading" class="loader"></span>
    <div class="form-card">
        <h2 class="title">{{ title() }}</h2>

        <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <!-- USERNAME -->
            <div class="input-group">
                <label for="username">Nome</label>
                <input formControlName="username" id="username" type="text" placeholder="Digite seu Nome" />

                <div class="error" *ngIf="form.get('username')?.touched && form.get('username')?.invalid">
                    <small *ngIf="form.get('username')?.errors?.['required']"> Nome é obrigatório </small>
                    <small *ngIf="form.get('username')?.errors?.['minlength']"> Mínimo 3 caracteres </small>
                </div>
            </div>

            <!-- PASSWORD -->
            <div class="input-group">
                <label for="password">Senha</label>
                <input formControlName="password" id="password" type="password" placeholder="Digite sua senha" />

                <div class="error" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
                    <small *ngIf="form.get('password')?.errors?.['required']"> Senha é obrigatória </small>
                    <small *ngIf="form.get('password')?.errors?.['minlength']"> Mínimo 6 caracteres </small>
                </div>
            </div>

            <!-- CONFIRM PASSWORD -->
            <div class="input-group">
                <label for="confirmPassword">Confirmar senha</label>
                <input
                    formControlName="confirmPassword"
                    id="confirmPassword"
                    type="password"
                    placeholder="Confirme sua senha"
                />

                <div class="error" *ngIf="form.get('confirmPassword')?.touched && form.get('confirmPassword')?.invalid">
                    <small *ngIf="form.get('confirmPassword')?.errors?.['required']"> Confirmação obrigatória </small>
                </div>

                <!-- ERRO DE SENHAS DIFERENTES -->
                <div class="error" *ngIf="form.errors?.['passwordMismatch'] && form.touched">
                    <small>As senhas não coincidem</small>
                </div>
            </div>

            <div class="form-action">
                <!-- BOTÃO -->
                <button class="btn btn-primary" type="submit" [disabled]="form.invalid">Registrar</button>

                <!-- LINK -->
                <a class="btn btn-link" routerLink="/sign-in">Entrar</a>
            </div>
        </form>
    </div>
</div>
